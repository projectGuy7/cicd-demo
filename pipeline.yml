# ============================================================
# CI/CD Pipeline with GitHub Actions
# ============================================================
# This file defines our automated pipeline.
# It runs automatically whenever code is pushed to GitHub!

name: CI/CD Pipeline  # Name shown in GitHub Actions tab

# TRIGGER: When does this pipeline run?
on:
  push:
    branches: [ main, develop ]   # On every push to main or develop
  pull_request:
    branches: [ main ]            # On every pull request to main

# JOBS: What does the pipeline actually DO?
jobs:

  # ─────────────────────────────────────────
  # JOB 1: Run Tests (Continuous Integration)
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest        # Fresh Ubuntu machine in the cloud

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]  # Test on 3 Python versions!

    steps:
      # Step 1: Download our code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install the Python version we need
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      # Step 4: Run the tests with coverage report
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing

      # Step 5: Verify coverage meets our minimum threshold (80%)
      - name: Check coverage threshold
        run: |
          pytest tests/ --cov=src --cov-fail-under=80

  # ─────────────────────────────────────────
  # JOB 2: Code Quality Check (Linting)
  # ─────────────────────────────────────────
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Run linter
        run: |
          # Check for syntax errors and obvious bugs
          flake8 src/ tests/ --max-line-length=100 --statistics

  # ─────────────────────────────────────────
  # JOB 3: Deploy (Continuous Deployment)
  # Only runs if tests AND linting PASS!
  # Only runs on pushes to 'main' branch.
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, lint]           # ← This is KEY: only runs if both jobs above succeed!
    if: github.ref == 'refs/heads/main'  # Only deploy from main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "🚀 All tests passed! Deploying to production..."
          echo "✅ Version: ${{ github.sha }}"
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ Triggered by: ${{ github.actor }}"
          echo ""
          echo "In a real project, this step would:"
          echo "  - Push a Docker image to a registry"
          echo "  - Deploy to AWS / Google Cloud / Heroku"
          echo "  - Update a Kubernetes cluster"
          echo "  - Send a Slack notification"
          echo ""
          echo "🎉 Deployment complete!"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
